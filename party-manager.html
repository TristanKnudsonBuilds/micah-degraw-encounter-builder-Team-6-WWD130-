<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Manager</title>

    <link rel="stylesheet" href="css/project.css">
</head>

<body>

    <header>
        <div class="logo">
            <h2>SMART<br>ENCOUNTER<br>BUILDER</h2>
        </div>

        <nav>
            <a href="encounter-builder.html" class="nav-btn">Encounter Builder</a>
            <a href="party-manager.html" class="nav-btn">Party Manager</a>
            <a href="sources.html" class="nav-btn">Sources</a>
        </nav>

        <div class="profile-icon">
            <span>👤</span>
        </div>
    </header>

    <main>

        <h1 class="page-title">Party Manager</h1>

        <section class="party-manager-container">

            <button class="arrow left">←</button>

            <div class="character-card">

                <div class="character-image">
                    <p>Character Image</p>
                    <img src="images/placeholder.png" alt="Character Image">
                </div>

                <div class="character-info">

                    <h2 class="character-name">Character Name</h2>

                    <div class="basic-info">
                        <input type="text" placeholder="Class">
                        <input type="text" placeholder="Race">

                        <div class="level-subclass">
                            <select>
                                <option>LVL</option>
                            </select>
                            <input type="text" placeholder="Subclass">
                        </div>

                        <input type="text" placeholder="Background">
                    </div>

                    <div class="stats-section">
                        <h3>Stats</h3>
                        <table>
                            <tr><td>Strength</td><td></td></tr>
                            <tr><td>Dexterity</td><td></td></tr>
                            <tr><td>Constitution</td><td></td></tr>
                            <tr><td>Intelligence</td><td></td></tr>
                            <tr><td>Wisdom</td><td></td></tr>
                            <tr><td>Charisma</td><td></td></tr>
                        </table>
                    </div>

                    <div class="spells-section">
                        <h3>Spells/Weapons</h3>
                        <table>
                            <tr>
                                <th>Name</th>
                                <th>DMG</th>
                            </tr>
                            <tr><td></td><td></td></tr>
                            <tr><td></td><td></td></tr>
                            <tr><td></td><td></td></tr>
                        </table>
                    </div>

                </div>
            </div>

            <button class="arrow right">→</button>

        </section>

        <div class="pagination">
            <span>1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>
            <span>5</span>
        </div>

    </main>

    <footer>

        <div class="footer-left">
            <div class="small-box"></div>
            <div class="small-box"></div>
            <div class="small-box"></div>
        </div>

        <div class="footer-center">
            <p>History</p>
            <p>Account</p>
            <p>Sources</p>
            <p>Encounter Builder Examples</p>
        </div>

        <div class="footer-right">
            <div class="small-box"></div>
            <div class="small-box"></div>
            <div class="small-box"></div>
        </div>

    </footer>

</body>
</html>
